# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

# Project info (auto-detected, edit if needed)
project:
  name: "whitelabel"
  language: "TypeScript"
  framework: "Next.js"
  description: ""  # Add a brief description

# Commands (auto-detected from package.json/pyproject.toml)
commands:
  test: "npm test"
  lint: "npm run lint"
  build: "npm run build"

# Rules - instructions the AI MUST follow
# These are injected into every prompt
rules:
  - "Always use TypeScript with strict type checking"
  - "Follow the existing component patterns and file structure"
  - "Use Tailwind CSS for styling with proper dark mode support"
  - "Use the branding colors from the branding-utils hook"
  - "Ensure all components are accessible with proper ARIA labels"
  - "Use framer-motion for smooth animations and transitions"
  - "Follow the existing cart and variation handling patterns"

# Boundaries - files/folders the AI should not modify
boundaries:
  never_touch:
    # Examples:
    # - "src/legacy/**"
    # - "migrations/**"
    # - "*.lock"
